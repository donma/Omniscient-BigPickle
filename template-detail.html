<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="meta-description" content="樣板詳情">
  <link rel="canonical" href="https://example.com/template-detail">
  <meta property="og:type" content="website">
  <meta property="og:title" id="og-title" content="樣板詳情">
  <meta property="og:description" id="og-description" content="樣板詳情">
  <meta property="og:image" id="og-image" content="assets/img/og-image.jpg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/gallery.css">
  <title id="page-title">樣板詳情 - 全職設計視角</title>
  <style>
    .detail-hero { padding: 7rem 2rem 3rem; background: linear-gradient(135deg, #f8fafc, #e2e8f0); }
    .detail-container { max-width: 1200px; margin: 0 auto; }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); text-decoration: none; margin-bottom: 2rem; font-size: 0.9rem; }
    .back-link:hover { color: var(--primary); }
    .detail-header { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
    .detail-preview { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); background: var(--bg-card); }
    .detail-preview img { width: 100%; height: auto; display: block; }
    .detail-info h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.75rem; }
    .detail-info .desc { font-size: 1.05rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.5rem; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .info-item { padding: 0.75rem 1rem; background: var(--bg); border-radius: var(--radius); }
    .info-item label { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.25rem; }
    .info-item span { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1.5rem 0; }
    .detail-tags .tag { padding: 0.35rem 0.75rem; background: rgba(99,102,241,0.1); border-radius: 0.5rem; font-size: 0.8rem; color: var(--primary); font-weight: 500; }
    .detail-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .detail-actions .btn { padding: 0.75rem 1.5rem; font-size: 0.9rem; }
    .section-title { font-size: 1.25rem; font-weight: 700; margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary); }
    .page-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
    .page-item { padding: 0.75rem 1rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); text-align: center; font-size: 0.85rem; color: var(--text-secondary); transition: var(--transition); }
    .page-item:hover { border-color: var(--primary); color: var(--primary); }
    .page-item .icon { font-size: 1.25rem; display: block; margin-bottom: 0.25rem; }
    @media (max-width: 768px) {
      .detail-header { grid-template-columns: 1fr; gap: 2rem; }
      .detail-info h1 { font-size: 1.75rem; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <div class="logo-icon"><i class="bi bi-grid-1x2-fill"></i></div>
        <span>全職設計視角</span>
      </a>
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html" class="nav-link">首頁</a></li>
          <li><a href="index.html#templates" class="nav-link">樣板館</a></li>
          <li><a href="README.md" class="nav-link">說明文件</a></li>
        </ul>
      </nav>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="選單"><i class="bi bi-list"></i></button>
    </div>
  </header>

  <section class="detail-hero">
    <div class="detail-container">
      <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> 返回樣板館</a>
      <div id="detail-content">
        <div class="detail-header">
          <div class="detail-preview">
            <img id="detail-image" src="assets/img/placeholder.svg" alt="樣板預覽" onerror="this.src='assets/img/placeholder.svg'">
          </div>
          <div class="detail-info">
            <h1 id="detail-name">樣板名稱</h1>
            <div class="desc" id="detail-desc">載入中...</div>
            <div class="info-grid" id="detail-meta"></div>
            <div class="detail-tags" id="detail-tags"></div>
            <div class="detail-actions" id="detail-actions">
              <a href="#" id="btn-preview" target="_blank" class="btn btn-primary">預覽網站 <i class="bi bi-box-arrow-up-right"></i></a>
              <a href="#" id="btn-prompt" target="_blank" class="btn btn-outline">查看 Prompt <i class="bi bi-file-text"></i></a>
              <span id="btn-zip" class="btn btn-ghost btn-disabled">[ZIP] 待打包</span>
            </div>
          </div>
        </div>

        <h2 class="section-title">12 頁完整網站</h2>
        <div class="page-list" id="page-list"></div>

        <h2 class="section-title">設計特色</h2>
        <div id="detail-features" style="color:var(--text-secondary);line-height:1.8"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p><strong>全職設計視角</strong> — 每一套樣板都是獨立設計作品</p>
  </footer>

  <script src="assets/js/data.js"></script>
  <script>
    (function() {
      function getTemplateById(id) {
        if (typeof TEMPLATES_DATA !== 'undefined' && TEMPLATES_DATA.templates) {
          return TEMPLATES_DATA.templates.find(t => t.id === id);
        }
        return null;
      }

      function getTags(t) {
        if (Array.isArray(t.tags)) return t.tags;
        if (t.tags && typeof t.tags === 'object') return Object.values(t.tags).flat().filter(Boolean);
        return [];
      }

      function loadDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'template-001';
        const t = getTemplateById(id);
        if (!t) {
          document.getElementById('detail-name').textContent = '樣板不存在';
          document.getElementById('detail-desc').textContent = '請返回樣板館重新選擇。';
          return;
        }
        document.title = t.name + ' - 全職設計視角';
        document.getElementById('page-title').textContent = document.title;
        document.getElementById('meta-description').content = t.description || '';
        document.getElementById('og-title').content = t.name;
        document.getElementById('og-description').content = t.description || '';
        document.getElementById('detail-name').textContent = t.name;
        document.getElementById('detail-desc').textContent = t.description || '';
        document.getElementById('detail-image').src = t.previewImage || 'assets/img/placeholder.svg';

        document.getElementById('detail-meta').innerHTML = [
          { label: '產業分類', value: t.industryCategory || t.industry || '-' },
          { label: '版型類型', value: t.layoutType || '-' },
          { label: '色系', value: t.colorTheme || '-' },
          { label: '背景模式', value: t.backgroundMode === 'dark' ? '深色底' : '淺色底' },
          { label: 'Hero 模式', value: t.heroPattern || '-' },
          { label: '導覽模式', value: t.navigationPattern || '-' },
          { label: '內容節奏', value: t.contentRhythm || '-' },
          { label: '頁面數量', value: (t.pageCount || 12) + ' 頁' }
        ].map(d => `<div class="info-item"><label>${d.label}</label><span>${d.value}</span></div>`).join('');

        const tags = getTags(t);
        document.getElementById('detail-tags').innerHTML = tags.map(tg => `<span class="tag">${tg}</span>`).join('');

        document.getElementById('btn-preview').href = t.demoUrl || '#';
        document.getElementById('btn-prompt').href = t.promptUrl || '#';
        const zipBtn = document.getElementById('btn-zip');
        if (t.hasZip) {
          zipBtn.className = 'btn btn-outline';
          zipBtn.innerHTML = '下載 ZIP';
          zipBtn.onclick = () => window.location.href = t.zipUrl;
        }

        const pages = [
          'index.html', 'about.html', 'services.html', 'service-detail.html',
          'portfolio.html', 'reviews.html', 'faq.html', 'booking.html',
          'process.html', 'blog.html', 'blog-detail.html', 'contact.html'
        ];
        const pageIcons = ['🏠', '👤', '🔧', '📋', '🖼️', '⭐', '❓', '📅', '⚙️', '📝', '📖', '📞'];
        document.getElementById('page-list').innerHTML = pages.map((p, i) =>
          `<div class="page-item"><span class="icon">${pageIcons[i]}</span>${p}</div>`
        ).join('');

        const features = [
          '版型：' + (t.layoutType || '客製化版型'),
          'Hero：' + (t.heroPattern || '自訂 Hero'),
          '導覽：' + (t.navigationPattern || '自訂導覽'),
          '卡片風格：' + (t.cardStyle || '自訂卡片'),
          'CTA 風格：' + (t.ctaStyle || '自訂 CTA'),
          '圖片豐富度：' + (t.imageRich ? '高 (25-30 張圖片)' : '標準'),
          '設計差異化：' + (t.differenceReason || '完整獨立設計')
        ];
        document.getElementById('detail-features').innerHTML =
          '<ul style="padding-left:1.25rem">' + features.map(f => `<li style="margin-bottom:0.5rem">${f}</li>`).join('') + '</ul>';
      }

      document.addEventListener('DOMContentLoaded', loadDetail);
    })();
  </script>
</body>
</html>
